name: shellcheck

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: read

jobs:
  shellcheck:
    name: ShellCheck + bash -n
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: bash -n (syntax)
        run: bash -n pi-optimiser.sh

      - name: ShellCheck
        run: shellcheck --severity=warning --shell=bash pi-optimiser.sh

      - name: --help smoke test
        run: |
          chmod +x pi-optimiser.sh
          ./pi-optimiser.sh --help
          ./pi-optimiser.sh --version
          ./pi-optimiser.sh --list-tasks
