name: shellcheck

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: read

jobs:
  shellcheck:
    name: ShellCheck + bash -n
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: bash -n (syntax)
        run: |
          bash -n pi-optimiser.sh
          for f in lib/util/*.sh lib/tasks/*.sh lib/features/*.sh lib/ui/*.sh scripts/*.sh; do
            [[ -f "$f" ]] && bash -n "$f"
          done
          bash -n install.sh
          # The test harness and the Pi-binary stubs are shell too — a
          # broken stub silently weakens every integration run, so syntax-
          # check them here as well.
          for f in tests/docker/run-tests.sh tests/docker/stubs/*; do
            [[ -f "$f" ]] && bash -n "$f"
          done

      - name: ShellCheck
        run: |
          shellcheck --severity=warning --shell=bash \
            pi-optimiser.sh \
            lib/util/*.sh \
            lib/tasks/*.sh \
            lib/features/*.sh \
            lib/ui/*.sh \
            scripts/*.sh \
            install.sh \
            tests/docker/run-tests.sh \
            tests/docker/stubs/*

      - name: --help smoke test
        run: |
          chmod +x pi-optimiser.sh
          ./pi-optimiser.sh --help
          ./pi-optimiser.sh --version
          ./pi-optimiser.sh --list-tasks

      - name: Build and verify release bundle
        run: |
          chmod +x scripts/build-bundle.sh
          scripts/build-bundle.sh
          # Bundle must run standalone (no lib/ dependency).
          tmp=$(mktemp -d)
          cp dist/pi-optimiser-bundle.sh "$tmp/pi-optimiser-bundle.sh"
          "$tmp/pi-optimiser-bundle.sh" --version
          "$tmp/pi-optimiser-bundle.sh" --list-tasks | wc -l
          bash -n "$tmp/pi-optimiser-bundle.sh"
