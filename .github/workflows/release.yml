name: release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

# Default to read-only at the workflow scope; bundle job elevates to
# `contents: write` locally for the release-upload step only.
permissions:
  contents: read

jobs:
  bundle:
    name: Build + attach release bundle
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Pinned to a full commit SHA (actions/checkout v5.0.1) to prevent
      # a compromised tag from silently swapping out the action. Bump
      # deliberately, not automatically.
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Guard ref_name shape
        # Release tags are constrained by the `on.push.tags` pattern but
        # double-check — defence in depth against an unexpected ref
        # flowing into shell via github.ref_name below. Pass the context
        # value through an env var rather than interpolating `${{ ... }}`
        # directly into the shell (prevents template-injection if the
        # tag ref ever contains shell-meaningful characters).
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          case "$REF_NAME" in
            v[0-9]*.[0-9]*.[0-9]*|v[0-9]*.[0-9]*.[0-9]*-*) ;;
            *) echo "unexpected ref_name: $REF_NAME" >&2; exit 1 ;;
          esac

      - name: Build bundle
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          chmod +x scripts/build-bundle.sh
          scripts/build-bundle.sh "dist/pi-optimiser-${REF_NAME}.sh"
          # cd into dist/ so the .sha256 file records just the filename
          # and `sha256sum -c` works when users download the pair.
          ( cd dist && sha256sum "pi-optimiser-${REF_NAME}.sh" \
            > "pi-optimiser-${REF_NAME}.sh.sha256" )

      - name: Upload release artefacts
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2.6.2
        with:
          name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') }}
          files: |
            dist/pi-optimiser-${{ github.ref_name }}.sh
            dist/pi-optimiser-${{ github.ref_name }}.sh.sha256
