name: release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

permissions:
  contents: write

jobs:
  bundle:
    name: Build + attach release bundle
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build bundle
        run: |
          chmod +x scripts/build-bundle.sh
          scripts/build-bundle.sh dist/pi-optimiser-${{ github.ref_name }}.sh
          # cd into dist/ so the .sha256 file records just the filename
          # and `sha256sum -c` works when users download the pair.
          ( cd dist && sha256sum pi-optimiser-${{ github.ref_name }}.sh \
            > pi-optimiser-${{ github.ref_name }}.sh.sha256 )

      - name: Upload release artefacts
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') }}
          files: |
            dist/pi-optimiser-${{ github.ref_name }}.sh
            dist/pi-optimiser-${{ github.ref_name }}.sh.sha256
