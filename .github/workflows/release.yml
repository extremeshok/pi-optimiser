name: release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

# Default to read-only at the workflow scope; bundle job elevates to
# `contents: write` locally for the release-upload step only.
permissions:
  contents: read

jobs:
  bundle:
    name: Build + attach release bundle
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Pinned to a full commit SHA (actions/checkout v5.0.1) to prevent
      # a compromised tag from silently swapping out the action. Bump
      # deliberately, not automatically.
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Guard ref_name shape
        # Release tags are constrained by the `on.push.tags` pattern but
        # double-check — defence in depth against an unexpected ref
        # flowing into shell via github.ref_name below. Pass the context
        # value through an env var rather than interpolating `${{ ... }}`
        # directly into the shell (prevents template-injection if the
        # tag ref ever contains shell-meaningful characters).
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          case "$REF_NAME" in
            v[0-9]*.[0-9]*.[0-9]*|v[0-9]*.[0-9]*.[0-9]*-*) ;;
            *) echo "unexpected ref_name: $REF_NAME" >&2; exit 1 ;;
          esac

      - name: Verify version matches tag
        # A release whose SCRIPT_VERSION or man-page footer disagrees with
        # the tag ships an installer that reports the wrong version and
        # makes --check-update comparisons wrong. Fail rather than publish
        # the mismatch. REF_NAME flows in via env (not inline ${{ }}) so a
        # crafted ref can't inject shell.
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          expected="${REF_NAME#v}"
          expected="${expected%%-*}"   # strip any -rc/-beta pre-release suffix
          script_ver=$(sed -n 's/^SCRIPT_VERSION="\([^"]*\)".*/\1/p' pi-optimiser.sh | head -1)
          if [[ "$script_ver" != "$expected" ]]; then
            echo "SCRIPT_VERSION ($script_ver) does not match tag ($expected)" >&2
            exit 1
          fi
          man_ver=$(sed -n 's/^footer: pi-optimiser \(.*\)$/\1/p' share/man/pi-optimiser.8.md | head -1)
          if [[ -n "$man_ver" && "$man_ver" != "$expected" ]]; then
            echo "man page footer ($man_ver) does not match tag ($expected)" >&2
            exit 1
          fi
          echo "Version $expected matches tag, SCRIPT_VERSION, and man footer."

      - name: Build bundle
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          chmod +x scripts/build-bundle.sh
          scripts/build-bundle.sh "dist/pi-optimiser-${REF_NAME}.sh"
          # cd into dist/ so the .sha256 file records just the filename
          # and `sha256sum -c` works when users download the pair.
          ( cd dist && sha256sum "pi-optimiser-${REF_NAME}.sh" \
            > "pi-optimiser-${REF_NAME}.sh.sha256" )

      - name: Upload release artefacts
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b  # v3.0.1
        with:
          name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') }}
          files: |
            dist/pi-optimiser-${{ github.ref_name }}.sh
            dist/pi-optimiser-${{ github.ref_name }}.sh.sha256
